<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>My Profile – SkillSwap</title>

  <!-- Styles & Fonts -->
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter&family=Playfair+Display&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- Favicon -->
  <link rel="icon" href="favicon.png" type="image/png" />
</head>

<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-container">
      <img src="logo.png" alt="SkillSwap Logo" class="logo" />
      <h1 class="site-title">
        <a href="dashboard.html">SkillSwap</a>
      </h1>
    </div>
  </header>

  <!-- Main Content -->
  <main class="container">
    <h2>My Profile</h2>

    <form id="profileForm">
      <textarea id="bio" placeholder="Write a short bio..." required></textarea>
      <input type="text" id="offeredSkill" placeholder="Skill You Offer" required />
      <input type="text" id="requestedSkill" placeholder="Skill You Want" required />
      <button type="submit">Save Profile</button>
    </form>

    <p>Average Rating: <span id="avgRating">Loading...</span></p>
  </main>

  <!-- Scripts -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="js/profile.js"></script>
</body>
</html>
