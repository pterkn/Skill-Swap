<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile – SkillSwap</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display&display=swap" rel="stylesheet">

</head>
<body>
    <header class="site-header">
  <h1 class="site-title">
    <a href="dashboard.html">SkillSwap</a>
  </h1>
</header>


  <div class="container">
    <h2>My Profile</h2>

    <form id="profileForm">
      <textarea id="bio" placeholder="Write a short bio..." required></textarea>
      <input type="text" id="offeredSkill" placeholder="Skill You Offer" required />
      <input type="text" id="requestedSkill" placeholder="Skill You Want" required />
      <button type="submit">Save Profile</button>
    </form>
  </div>

  <p>Average Rating: <span id="avgRating">Loading...</span></p>


  <script type="module" src="firebase.js"></script>
  <script type="module" src="js/profile.js"></script>
</body>
</html>
