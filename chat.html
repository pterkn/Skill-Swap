<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat – SkillSwap</title>

  <!-- Styles & Fonts -->
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter&family=Playfair+Display&display=swap" rel="stylesheet">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- Favicon -->
  <link rel="icon" href="favicon.png" type="image/png">
</head>

<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-container">
      <img src="logo.png" alt="SkillSwap Logo" class="logo" />
      <h1 class="site-title">
        <a href="dashboard.html">SkillSwap</a>
      </h1>
    </div>
  </header>

  <!-- Main Chat Container -->
  <main class="container">
    <h2>Chat with <span id="chatPartnerName">...</span></h2>

    <div id="chatBox" class="chat-box"></div>

    <form id="chatForm">
      <input type="text" id="chatInput" placeholder="Type a message..." required />
      <button type="submit">Send</button>
    </form>

    <button onclick="window.location.href='dashboard.html'">← Back to Dashboard</button>
  </main>

  <!-- Scripts -->
  <script type="module" src="firebase.js"></script>
  <script type="module" src="js/chat.js"></script>
</body>
</html>
